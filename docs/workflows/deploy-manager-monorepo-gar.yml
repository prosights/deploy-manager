name: Deploy Manager monorepo build

on:
  workflow_dispatch:
    inputs:
      deploy_manager_build_id:
        description: Deploy Manager build id
        required: true
      repository:
        description: owner/repo
        required: true
      branch:
        description: Branch that triggered the build
        required: true
      commit_sha:
        description: Commit SHA to build
        required: false
      image_ref:
        description: Representative image ref reported back to Deploy Manager
        required: true
      build_matrix:
        description: Compact JSON array of images with image_ref, build_context, and dockerfile
        required: true
      runner:
        description: Runner label or larger-runner label
        required: false
        default: ubuntu-latest

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(inputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || inputs.branch }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GAR_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.build_context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ matrix.image.image_ref }}
          cache-from: type=gha,scope=${{ matrix.image.cache_scope || matrix.image.image_ref }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.cache_scope || matrix.image.image_ref }}

  report:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Report to Deploy Manager
        env:
          DEPLOY_MANAGER_API_URL: ${{ vars.DEPLOY_MANAGER_API_URL }}
          DEPLOY_MANAGER_API_TOKEN: ${{ secrets.DEPLOY_MANAGER_API_TOKEN }}
          BUILD_ID: ${{ inputs.deploy_manager_build_id }}
          IMAGE_REF: ${{ inputs.image_ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then
            curl --fail-with-body -X POST "$DEPLOY_MANAGER_API_URL/api/builds/$BUILD_ID/complete" \
              -H "Authorization: Bearer $DEPLOY_MANAGER_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"status\":\"succeeded\",\"image_ref\":\"$IMAGE_REF\",\"external_url\":\"$RUN_URL\"}"
          else
            curl --fail-with-body -X POST "$DEPLOY_MANAGER_API_URL/api/builds/$BUILD_ID/complete" \
              -H "Authorization: Bearer $DEPLOY_MANAGER_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"status\":\"failed\",\"external_url\":\"$RUN_URL\",\"error_message\":\"GitHub Actions monorepo build failed\"}"
          fi
