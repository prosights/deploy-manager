name: Release Deploy Manager

on:
  workflow_call:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA from main to release
        required: true
        type: string
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Full 40-character commit SHA from main to release
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-manager-production
  cancel-in-progress: false

jobs:
  release:
    name: Release production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: Validate immutable source
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          [[ "$COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "commit_sha must be a lowercase full 40-character SHA" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$COMMIT_SHA"
          git fetch origin main
          git merge-base --is-ancestor "$COMMIT_SHA" origin/main || {
            echo "commit_sha must be reachable from main" >&2
            exit 1
          }

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GAR_REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: image
        name: Resolve built image digest
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          IMAGE_NAME: ${{ vars.DEPLOY_MANAGER_IMAGE }}
        run: |
          set -euo pipefail
          test -n "$IMAGE_NAME" || {
            echo "DEPLOY_MANAGER_IMAGE repo variable is required" >&2
            exit 1
          }

          image_ref="$IMAGE_NAME:sha-$COMMIT_SHA"
          digest="$(docker buildx imagetools inspect "$image_ref" --format '{{ .Manifest.Digest }}')"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "No immutable image digest found for $image_ref" >&2
            exit 1
          }

          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "ref=$IMAGE_NAME@$digest" >> "$GITHUB_OUTPUT"

      - name: Release with rollback
        env:
          API_TOKEN: ${{ secrets.DEPLOY_MANAGER_API_TOKEN }}
          APPLICATION_ID: ${{ vars.DEPLOY_MANAGER_APPLICATION_ID }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          GCE_INSTANCE: ${{ vars.DEPLOY_MANAGER_GCE_INSTANCE }}
          GCE_PROJECT: ${{ vars.DEPLOY_MANAGER_GCE_PROJECT }}
          GCE_ZONE: ${{ vars.DEPLOY_MANAGER_GCE_ZONE }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          set -Eeuo pipefail

          for value in API_TOKEN APPLICATION_ID GCE_INSTANCE GCE_PROJECT GCE_ZONE IMAGE_DIGEST IMAGE_REF; do
            test -n "${!value}" || {
              echo "$value is required" >&2
              exit 1
            }
          done

          compose=/srv/deploy-manager/control/docker-compose.yml
          backup="$compose.release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.bak"
          control_changed=false
          public_promoted=false
          tunnel_pid=""

          ssh_exec() {
            gcloud compute ssh "$GCE_INSTANCE" \
              --project "$GCE_PROJECT" \
              --zone "$GCE_ZONE" \
              --tunnel-through-iap \
              --ssh-flag="-p 2345" \
              --command "$1" \
              --quiet
          }

          start_tunnel() {
            gcloud compute ssh "$GCE_INSTANCE" \
              --project "$GCE_PROJECT" \
              --zone "$GCE_ZONE" \
              --tunnel-through-iap \
              --ssh-flag="-p 2345" \
              --ssh-flag="-N" \
              --ssh-flag="-L 127.0.0.1:18088:127.0.0.1:8088" \
              --quiet >iap-tunnel.log 2>&1 &
            tunnel_pid="$!"
          }

          wait_ready() {
            for _ in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:18088/api/readyz >/dev/null; then
                return 0
              fi
              sleep 2
            done
            cat iap-tunnel.log >&2 || true
            return 1
          }

          api() {
            curl --fail-with-body -fsS \
              -H "Authorization: Bearer $API_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }

          poll_deployment() {
            local deployment_id="$1"
            local status
            for _ in $(seq 1 360); do
              status="$(api "http://127.0.0.1:18088/api/deployments?limit=500" | jq -er --arg id "$deployment_id" '.[] | select(.id == $id) | .status')"
              case "$status" in
                succeeded) return 0 ;;
                failed|cancelled)
                  echo "Deployment $deployment_id ended with status $status" >&2
                  return 1
                  ;;
              esac
              sleep 5
            done
            echo "Timed out waiting for deployment $deployment_id" >&2
            return 1
          }

          queue_deployment() {
            local payload response
            payload="$(jq -nc \
              --arg application_id "$APPLICATION_ID" \
              --arg commit_sha "$COMMIT_SHA" \
              --arg image_ref "$IMAGE_REF" \
              --arg image_digest "$IMAGE_DIGEST" \
              --arg actor "github-actions:${GITHUB_RUN_ID}" \
              '{application_id: $application_id, trigger: "github_push", strategy: "blue_green", commit_sha: $commit_sha, image_ref: $image_ref, image_digest: $image_digest, actor: $actor}')"
            response="$(api -X POST --data "$payload" http://127.0.0.1:18088/api/deployments)"
            jq -er '.id' <<< "$response"
          }

          rollback_release() {
            local exit_code="$?"
            local rollback_id
            trap - ERR
            set +e
            echo "Release failed; restoring the previous release." >&2

            if [ "$control_changed" = true ]; then
              ssh_exec "set -euo pipefail; sudo test -f '$backup'; sudo cp '$backup' '$compose'; sudo docker compose -f '$compose' config --quiet; sudo docker compose -f '$compose' pull app; sudo docker compose -f '$compose' up -d --no-deps app"
              wait_ready
            fi

            if [ "$public_promoted" = true ]; then
              rollback_id="$(api -X POST "http://127.0.0.1:18088/api/applications/$APPLICATION_ID/rollback" | jq -er '.id')"
              poll_deployment "$rollback_id"
            fi
            exit "$exit_code"
          }

          cleanup() {
            if [ -n "$tunnel_pid" ]; then
              kill "$tunnel_pid" 2>/dev/null || true
            fi
          }

          trap cleanup EXIT
          trap rollback_release ERR

          ssh_exec "set -euo pipefail; command -v docker >/dev/null; sudo docker info >/dev/null; sudo test -f '$compose'; sudo docker compose -f '$compose' config --quiet; sudo docker compose -f '$compose' ps --services --status running | grep -qx app"
          start_tunnel
          wait_ready

          api "http://127.0.0.1:18088/api/applications" | jq -e \
            --arg application_id "$APPLICATION_ID" \
            'any(.[]; .id == $application_id and .github_auto_deploy == false)' >/dev/null || {
              echo "The Deploy Manager application must exist and have GitHub auto deploy disabled" >&2
              exit 1
            }

          api "http://127.0.0.1:18088/api/deployments?limit=500" | jq -e \
            --arg application_id "$APPLICATION_ID" \
            '[.[] | select(.application_id == $application_id and (.status == "queued" or .status == "running"))] | length == 0' >/dev/null || {
              echo "Deploy Manager already has an in-progress production deployment" >&2
              exit 1
            }

          deployment_id="$(queue_deployment)"
          poll_deployment "$deployment_id"
          public_promoted=true

          ssh_exec "set -euo pipefail; sudo cp --preserve=mode,ownership,timestamps '$compose' '$backup'"
          control_changed=true
          ssh_exec "set -euo pipefail; image_ref='$IMAGE_REF'; compose='$compose'; tmp=\$(mktemp); sudo awk -v image=\"\$image_ref\" 'BEGIN { in_app=0; replaced=0 } /^  app:/ { in_app=1 } in_app && /^    image:/ { print \"    image: \" image; in_app=0; replaced=1; next } { print } END { if (!replaced) exit 42 }' \"\$compose\" > \"\$tmp\"; sudo install -m 0644 \"\$tmp\" \"\$compose\"; rm -f \"\$tmp\"; sudo docker compose -f \"\$compose\" config --quiet; sudo docker compose -f \"\$compose\" pull app; sudo docker compose -f \"\$compose\" up -d --no-deps app"
          wait_ready
          api "http://127.0.0.1:18088/api/version" | jq -e --arg commit_sha "$COMMIT_SHA" '.commit_sha == $commit_sha' >/dev/null
          trap - ERR

          echo "Released $COMMIT_SHA as $IMAGE_REF"
