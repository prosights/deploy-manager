name: Dependabot Slack notification

on:
  workflow_dispatch:
    inputs:
      message:
        description: Message to send to Slack
        required: false
        default: Deploy Manager Dependabot Slack notification smoke test.
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  pull-requests: read

jobs:
  notify:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send to code-review
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CODE_REVIEW_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_MESSAGE: ${{ github.event.inputs.message || '' }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_CODE_REVIEW_WEBHOOK_URL is not configured; Dependabot Slack notification cannot be delivered." >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            text="${MANUAL_MESSAGE:-Deploy Manager Dependabot Slack notification smoke test.}"
          else
            text="Dependabot opened PR #${PR_NUMBER} in ${REPOSITORY}: ${PR_TITLE} ${PR_URL}"
          fi

          payload=$(jq -n --arg text "$text" '{ text: $text }')

          curl --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
