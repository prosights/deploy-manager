name: Verify

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: go test ./...
      - run: go build ./cmd/server
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.dev.yml config --quiet
      - run: docker build --progress=plain -t deploy-manager:verify .
