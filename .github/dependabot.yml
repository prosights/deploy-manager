version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - go

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - frontend

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - github-actions
