services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: deploy_manager
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: deploy
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - deploy_manager_dev_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy -d deploy_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - deploy_manager_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://deploy:deploy@postgres:5432/deploy_manager?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STATIC_DIR: web/dist
      SSH_KNOWN_HOSTS_PATH: /app/known_hosts
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      DOPPLER_PROJECT: "${DOPPLER_PROJECT:-}"
      DOPPLER_CONFIG: "${DOPPLER_CONFIG:-}"
      DOPPLER_TOKEN: "${DOPPLER_TOKEN:-}"
      DOPPLER_CLI_PATH: "${DOPPLER_CLI_PATH:-doppler}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-}"
      RESEND_TO_EMAIL: "${RESEND_TO_EMAIL:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  deploy_manager_dev_pg:
  deploy_manager_dev_redis:
