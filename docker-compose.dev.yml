services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: deploy_manager
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: deploy
    ports:
      - "${FORWARD_DB_PORT:-15432}:5432"
    volumes:
      - deploy_manager_dev_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy -d deploy_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-16379}:6379"
    volumes:
      - deploy_manager_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      HOME: /home/deploy
      DATABASE_URL: postgres://deploy:deploy@postgres:5432/deploy_manager?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      STATIC_DIR: web/dist
      SSH_KNOWN_HOSTS_PATH: /app/known_hosts
      API_TOKEN: "${API_TOKEN:-}"
      AUTH_DISABLED: "${AUTH_DISABLED:-true}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY:-}"
      GITHUB_APP_PRIVATE_KEY_PATH: "${GITHUB_APP_PRIVATE_KEY_PATH:-}"
      DOPPLER_PROJECT: "${DOPPLER_PROJECT:-}"
      DOPPLER_CONFIG: "${DOPPLER_CONFIG:-}"
      DOPPLER_TOKEN: "${DOPPLER_TOKEN:-}"
      DOPPLER_CLI_PATH: "${DOPPLER_CLI_PATH:-doppler}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL:-}"
      RESEND_TO_EMAIL: "${RESEND_TO_EMAIL:-}"
    ports:
      - "${APP_PORT:-18080}:8080"
    group_add:
      - "${DOCKER_GROUP_ID:-999}"
    volumes:
      # The container runs as the unprivileged "deploy" user whose home is
      # /home/deploy, so SSH keys must be mounted there (not /root/.ssh).
      - ~/.ssh:/home/deploy/.ssh:ro
      - ~/.config/deploy-manager:/app/secrets:ro
      - ./data/playground/ssh:/home/deploy/playground/.ssh:ro
      - ./data/playground/known_hosts:/app/known_hosts:ro
      - ./data/apps:/srv/deploy-manager/apps
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/readyz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  playground:
    build:
      context: ops/local-playground
    ports:
      - "${PLAYGROUND_SSH_PORT:-2222}:22"
    volumes:
      - ./data/playground/ssh:/playground-key:ro
      - ./data/playground/apps:/srv/deploy-manager/apps
      - ./data/playground/sources:/srv/deploy-manager/source:ro
      - ./data/playground/caddy:/opt/infrastructure
      - deploy_manager_dev_playground_ssh_host:/etc/ssh
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 5s
      timeout: 5s
      retries: 10

  playground-bootstrap:
    image: postgres:18-alpine
    depends_on:
      app:
        condition: service_healthy
      playground:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -ec
      - |
        wget -qO- http://app:8080/api/servers | grep -q '"hostname":"playground"' && exit 0
        wget -qO /dev/null \
          --header='Content-Type: application/json' \
          --post-data='{"name":"playground","hostname":"playground","ssh_user":"root","ssh_port":22,"ssh_key_path":"/home/deploy/playground/.ssh/id_ed25519","connection_mode":"direct_ssh","proxy_type":"caddy"}' \
          http://app:8080/api/servers

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "${PLAYGROUND_HTTP_PORT:-80}:80"
    volumes:
      - ./data/playground/caddy:/etc/caddy
      - deploy_manager_dev_caddy_data:/data
      - deploy_manager_dev_caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      playground:
        condition: service_healthy
      playground-bootstrap:
        condition: service_completed_successfully

volumes:
  deploy_manager_dev_pg:
  deploy_manager_dev_redis:
  deploy_manager_dev_caddy_data:
  deploy_manager_dev_caddy_config:
  deploy_manager_dev_playground_ssh_host:
