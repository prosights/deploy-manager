services:
  workflows-server:
    image: ${DEPLOY_IMAGE}
    container_name: workflows-server-${DEPLOY_COLOR}
    restart: unless-stopped
    environment:
      APP_VERSION: ${APP_VERSION:-unknown}
      DEPLOY_COLOR: ${DEPLOY_COLOR}
      PORT: 8080
    ports:
      - "${DEPLOY_PORT}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 2s
      retries: 12
